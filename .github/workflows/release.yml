name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Smart Impact package version (for example, 5.3.8-smartimpact.1)
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 2
  PACKAGE_NAME: "@smartimpact-it/bootstrap"
  VERSION: "${{ inputs.version }}"
  TAG: "v${{ inputs.version }}"

jobs:
  release:
    name: Validate and publish
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Validate requested release
        run: node build/validate-release.mjs "$VERSION" "$GITHUB_REF_NAME"

      - name: Check tag, GitHub release, and npm state
        id: preflight
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          tag_commit="$(git rev-list -n 1 "$TAG" 2>/dev/null || true)"
          if [[ -n "$tag_commit" && "$tag_commit" != "$GITHUB_SHA" ]]; then
            echo "Tag $TAG points to $tag_commit instead of $GITHUB_SHA" >&2
            exit 1
          fi

          set +e
          release_draft="$(gh release view "$TAG" --json isDraft --jq .isDraft 2> "$RUNNER_TEMP/release-error")"
          release_status=$?
          set -e
          if [[ "$release_status" != "0" ]] && ! grep -qi "release not found" "$RUNNER_TEMP/release-error"; then
            cat "$RUNNER_TEMP/release-error" >&2
            exit "$release_status"
          elif [[ "$release_draft" == "false" ]]; then
            echo "GitHub release $TAG is already published" >&2
            exit 1
          fi
          echo "draft_exists=$([[ "$release_draft" == "true" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

          set +e
          npm view "$PACKAGE_NAME@$VERSION" version --json > /dev/null 2> "$RUNNER_TEMP/npm-error"
          npm_status=$?
          set -e
          if [[ "$npm_status" == "0" ]]; then
            npm view "$PACKAGE_NAME@$VERSION" --json > "$RUNNER_TEMP/npm-metadata.json"
            node build/validate-published-package.mjs "$RUNNER_TEMP/npm-metadata.json" "$GITHUB_SHA"
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          elif grep -q "E404" "$RUNNER_TEMP/npm-error"; then
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          else
            cat "$RUNNER_TEMP/npm-error" >&2
            exit "$npm_status"
          fi

      - name: Install npm dependencies
        run: npm ci

      - name: Run lint, tests, distribution build, and docs build
        run: npm test

      - name: Test reactive CSS in Chrome
        run: npm run css-test-runtime -- --browsers ChromeHeadless --single-run

      - name: Check bundle limits
        run: npm run bundlewatch
        env:
          BUNDLEWATCH_GITHUB_TOKEN: "${{ secrets.BUNDLEWATCH_GITHUB_TOKEN }}"
          CI_BRANCH_BASE: main

      - name: Validate npm package contents
        run: npm run package-check

      - name: Build release artifacts
        id: artifacts
        run: |
          release_directory="$RUNNER_TEMP/release"
          mkdir -p "$release_directory"
          npm run dist
          npm pack --ignore-scripts --json --pack-destination "$release_directory" > "$release_directory/pack.json"

          tarball_name="$(node --input-type=module -e "import fs from 'node:fs'; const result = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(result[0].filename)" "$release_directory/pack.json")"
          tarball="$release_directory/$tarball_name"
          zip_name="bootstrap-$VERSION-dist.zip"
          zip_path="$release_directory/$zip_name"
          zip_root="$RUNNER_TEMP/bootstrap-$VERSION-dist"

          mkdir -p "$zip_root"
          cp -R dist/. "$zip_root/"
          (cd "$RUNNER_TEMP" && zip -qr9 "$zip_path" "bootstrap-$VERSION-dist")
          (cd "$release_directory" && sha256sum "$tarball_name" "$zip_name" > SHA256SUMS)

          echo "directory=$release_directory" >> "$GITHUB_OUTPUT"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "zip=$zip_path" >> "$GITHUB_OUTPUT"
          echo "checksums=$release_directory/SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Smoke-test release artifacts
        env:
          TARBALL: "${{ steps.artifacts.outputs.tarball }}"
          ZIP: "${{ steps.artifacts.outputs.zip }}"
          CHECKSUMS: "${{ steps.artifacts.outputs.checksums }}"
        run: |
          required_files=(
            package/dist/css/bootstrap.css
            package/dist/css/bootstrap.rtl.min.css
            package/dist/js/bootstrap.bundle.js
            package/js/dist/alert.js
            package/scss/bootstrap.scss
            package/scss/runtime-tokens.json
          )
          tar_contents="$(tar -tzf "$TARBALL")"
          for required_file in "${required_files[@]}"; do
            grep -Fxq "$required_file" <<< "$tar_contents"
          done

          fixture="$(mktemp -d)"
          (cd "$fixture" && npm init --yes >/dev/null)
          npm install --prefix "$fixture" --ignore-scripts "bootstrap@file:$TARBALL"
          (cd "$fixture" && node --input-type=module -e "import.meta.resolve('bootstrap'); import.meta.resolve('bootstrap/js/dist/alert.js');")
          printf '%s\n' '@import "bootstrap/scss/functions";' '@import "bootstrap/scss/variables";' '.fixture { color: $primary; }' | node_modules/.bin/sass --load-path="$fixture/node_modules" --stdin >/dev/null

          unzip_directory="$(mktemp -d)"
          unzip -q "$ZIP" -d "$unzip_directory"
          test -f "$unzip_directory/bootstrap-$VERSION-dist/css/bootstrap.min.css"
          test -f "$unzip_directory/bootstrap-$VERSION-dist/js/bootstrap.bundle.min.js"
          (cd "$(dirname "$CHECKSUMS")" && sha256sum --check "$(basename "$CHECKSUMS")")

      - name: Create or resume draft GitHub release
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          if [[ "${{ steps.preflight.outputs.draft_exists }}" != "true" ]]; then
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes --draft
          fi
          gh release upload "$TAG" \
            "${{ steps.artifacts.outputs.tarball }}" \
            "${{ steps.artifacts.outputs.zip }}" \
            "${{ steps.artifacts.outputs.checksums }}" \
            --clobber

      - name: Publish exact npm tarball
        if: steps.preflight.outputs.npm_exists != 'true'
        run: npm publish "${{ steps.artifacts.outputs.tarball }}" --access public --tag latest --provenance

      - name: Verify the published npm alias
        run: |
          fixture="$(mktemp -d)"
          (cd "$fixture" && npm init --yes >/dev/null)
          for attempt in 1 2 3 4 5 6; do
            if npm install --prefix "$fixture" --ignore-scripts "bootstrap@npm:$PACKAGE_NAME@$VERSION"; then
              break
            fi
            if [[ "$attempt" == "6" ]]; then
              exit 1
            fi
            sleep 5
          done
          FIXTURE="$fixture" VERSION="$VERSION" node --input-type=module -e "import fs from 'node:fs'; import path from 'node:path'; const packageJson = JSON.parse(fs.readFileSync(path.join(process.env.FIXTURE, 'node_modules/bootstrap/package.json'))); if (packageJson.version !== process.env.VERSION) throw new Error('Installed alias has the wrong version');"
          (cd "$fixture" && node --input-type=module -e "import.meta.resolve('bootstrap'); import.meta.resolve('bootstrap/js/dist/alert.js');")
          printf '%s\n' '@import "bootstrap/scss/functions";' '@import "bootstrap/scss/variables";' '.fixture { color: $primary; }' | node_modules/.bin/sass --load-path="$fixture/node_modules" --stdin >/dev/null

      - name: Publish GitHub release
        env:
          GH_TOKEN: "${{ github.token }}"
        run: gh release edit "$TAG" --draft=false --latest
